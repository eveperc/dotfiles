# LSP and Code Intelligence

# =========================================================================
# LSP Core
# =========================================================================
[[plugins]]
repo = 'neovim/nvim-lspconfig'
on_event = ['VimEnter']
depends = ['nvim-navbuddy', 'nvim-navic']
hook_add = '''
" プラグインが追加された時点でLuaパスを設定
lua << EOF
local plugin_path = vim.fn.expand("<sfile>:p:h:h")
local lua_path = plugin_path .. "/lua"
if vim.fn.isdirectory(lua_path) == 1 then
  package.path = lua_path .. "/?.lua;" .. lua_path .. "/?/init.lua;" .. package.path
end
EOF
'''
hook_post_source = '''
" プラグインがsourceされた後にも確認
lua << EOF
local cache_path = vim.fn.stdpath("cache") .. "/dpp"
local lspconfig_path = cache_path .. "/repos/github.com/neovim/nvim-lspconfig/lua"
if not package.path:match("nvim%-lspconfig") then
  package.path = lspconfig_path .. "/?.lua;" .. lspconfig_path .. "/?/init.lua;" .. package.path
  -- vim.notify("Added lspconfig path in hook_post_source", vim.log.levels.INFO)
end
EOF
'''

[[plugins]]
repo = 'nvimdev/lspsaga.nvim'
on_event = 'BufRead'
depends = ['nvim-web-devicons']
hook_source = '''
lua << EOF
local ok, _ = pcall(require, 'plugins.lspsaga')
if not ok then
  require('lspsaga').setup({
    enable = false,
  })
end
EOF
'''

[[plugins]]
repo = 'https://git.sr.ht/~whynothugo/lsp_lines.nvim'
on_event = 'LspAttach'
hook_source = '''
lua << EOF
require("lsp_lines").setup()
EOF
'''

# =========================================================================
# LSP Management
# =========================================================================
[[plugins]]
repo = 'mason-org/mason.nvim'
on_event = ['VimEnter']
lazy = false
hook_source = '''
lua << EOF
require("mason").setup({
  ui = {
    icons = {
      package_installed = "✓",
      package_pending = "➜",
      package_uninstalled = "✗"
    }
  }
})
EOF
'''

[[plugins]]
repo = 'hrsh7th/cmp-nvim-lsp'
on_event = ['VimEnter']


[[plugins]]
repo = 'mason-org/mason-lspconfig.nvim'
depends = [
  'mason.nvim',
  'nvim-lspconfig',
]
lazy = false
hook_post_source = '''
lua << 'EOF'
-- （★この行は不要なので削除推奨★）
-- vim.notify('mason-lspconfig not found', vim.log.levels.ERROR)

local ok_mason, mason = pcall(require, 'mason')
if ok_mason and not vim.g.__mason_setup_done then
  mason.setup({})
  vim.g.__mason_setup_done = true
end

local ok_mlsp, mlsp = pcall(require, 'mason-lspconfig')
if not ok_mlsp then
  vim.notify('mason-lspconfig not found', vim.log.levels.ERROR)
  return
end

mlsp.setup({
  ensure_installed = { 'lua_ls', 'rust_analyzer', 'vtsls', 'intelephense' },  -- ★ 追加
  automatic_installation = true,
})

-- LSP 個別設定の読み込み
if not vim.g.__my_lsp_hooks_loaded then
  local cfg = vim.fn.stdpath('config')
  local join = (vim.fs and vim.fs.joinpath) or function(a,b) return a..'/'..b end
  local path = join(cfg, 'dpp/hooks/lsp.lua')
  if vim.uv and vim.uv.fs_stat(path) then
    local ok, err = pcall(dofile, path)
    if ok then
      vim.g.__my_lsp_hooks_loaded = true
      vim.notify('✅ loaded: dpp/hooks/lsp.lua', vim.log.levels.INFO)
    else
      vim.notify('Failed to load lsp.lua: '..tostring(err), vim.log.levels.ERROR)
    end
  else
    vim.notify('lsp.lua not found at '..path, vim.log.levels.WARN)
  end
end
EOF
'''


# =========================================================================
# Linting & Formatting
# =========================================================================
[[plugins]]
repo = 'creativenull/efmls-configs-nvim'
on_event = 'BufRead'
depends = ['nvim-lspconfig']

# =========================================================================
# Navigation
# =========================================================================
[[plugins]]
repo = 'SmiteshP/nvim-navbuddy'
depends = ['nvim-navic', 'nui.nvim']
on_cmd = 'Navbuddy'

[[plugins]]
repo = 'SmiteshP/nvim-navic'
on_event = 'LspAttach'
