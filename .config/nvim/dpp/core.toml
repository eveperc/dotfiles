# Core plugins - Minimal essential plugins only

# =========================================================================
# Package Manager Core (Required for dpp.vim to work)
# =========================================================================
[[plugins]]
repo = 'Shougo/dpp.vim'

[[plugins]]
repo = 'vim-denops/denops.vim'

[[plugins]]
repo = 'Shougo/dpp-ext-installer'

[[plugins]]
repo = 'Shougo/dpp-ext-lazy'

[[plugins]]
repo = 'Shougo/dpp-ext-toml'

[[plugins]]
repo = 'Shougo/dpp-protocol-git'

[[plugins]]
repo = 'Shougo/dpp-ext-local'

# =========================================================================
# Minimal Essential Plugins
# =========================================================================

# Colorscheme (即座に必要)
[[plugins]]
repo = 'neanias/everforest-nvim'
branch = 'main'
hook_add = '''
lua << EOF
require('everforest').setup({
  background = "medium",
  transparent_background_level = 0,
})
vim.cmd('colorscheme everforest')
EOF
'''

# Linting & Formatting (起動時に必要)
[[plugins]]
repo = 'dense-analysis/ale'
hook_add = '''
" ALE基本設定
let g:ale_enabled = 1
let g:ale_fix_on_save = 1

" PHP設定
let g:ale_php_phpcs_standard = 'PSR12'
let g:ale_php_phpcbf_standard = 'PSR12'
let g:ale_php_phpcs_use_global = 1
let g:ale_php_phpcbf_use_global = 1

" eslint設定
let g:ale_javascript_eslint_executable = 'eslint_d'
let g:ale_javascript_eslint_use_global = 1

" フォーマッタ設定
let g:ale_fixers = {
\   'css': ['prettier'],
\   'scss': ['prettier'],
\   'javascript': ['prettier'],
\   'typescript': ['prettier'],
\   'vue': ['prettier'],
\   'php': ['phpcbf'],
\}

echom '✅ ALE configuration loaded'
'''

# Base requirements
[[plugins]]
repo = 'nvim-lua/plenary.nvim'

[[plugins]]
repo = 'nvim-tree/nvim-web-devicons'
name = 'nvim-web-devicons'

