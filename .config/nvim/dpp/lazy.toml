# =========================================================================
# File Management - ファイル管理（コマンド実行時）
# =========================================================================

# 軽量ファイルエクスプローラー（lir）
[[plugins]]
repo = 'tamago324/lir.nvim'
depends = ['nvim-web-devicons']
on_event = ['VimEnter']
hook_source = '''
lua << EOF
local actions = require 'lir.actions'
local mark_actions = require 'lir.mark.actions'
local clipboard_actions = require 'lir.clipboard.actions'

require('lir').setup({
  show_hidden_files = false,
  ignore = {".DS_Store"},
  devicons = {
    enable = true,
    highlight_dirname = true
  },
  mappings = {
    ['l']     = actions.edit,
    ['<C-s>'] = actions.split,
    ['<C-v>'] = actions.vsplit,
    ['<C-t>'] = actions.tabedit,
    ['h'] = actions.up,
    ['q'] = actions.quit,
    ['K'] = actions.mkdir,
    ['N'] = actions.newfile,
    ['R'] = actions.rename,
    ['@'] = actions.cd,
    ['Y'] = actions.yank_path,
    ['.'] = actions.toggle_show_hidden,
    ['D'] = actions.delete,
    ['J'] = function()
      mark_actions.toggle_mark()
      vim.cmd('normal! j')
    end,
    ['C'] = clipboard_actions.copy,
    ['X'] = clipboard_actions.cut,
    ['P'] = clipboard_actions.paste,
  },
  float = {
    winblend = 0,
    curdir_window = {
      enable = false,
      highlight_dirname = false
    },
  },
  hide_cursor = true,
})
EOF
'''

