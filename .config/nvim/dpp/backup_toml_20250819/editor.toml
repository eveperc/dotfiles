# Editor Enhancements

# =========================================================================
# Treesitter
# =========================================================================
[[plugins]]
repo = 'nvim-treesitter/nvim-treesitter'
on_event = ['BufRead', 'BufNewFile']
hook_post_update = 'TSUpdate'
hook_source = '''
lua << EOF
require('nvim-treesitter.configs').setup({
  ensure_installed = { 
    "lua", "vim", "vimdoc", "query",
    "typescript", "javascript", "tsx", "json",
    "python", "rust", "go", "c", "cpp",
    "html", "css", "yaml", "toml", "markdown"
  },
  highlight = { enable = true },
  indent = { enable = true },
})
EOF
'''

[[plugins]]
repo = 'yioneko/nvim-yati'
depends = ['nvim-treesitter']
on_ft = ['python', 'yaml']

[[plugins]]
repo = 'nvim-treesitter/nvim-treesitter-textobjects'
depends = ['nvim-treesitter']
on_event = 'BufRead'

[[plugins]]
repo = 'nvim-treesitter/nvim-treesitter-context'
depends = ['nvim-treesitter']
on_event = 'BufRead'

[[plugins]]
repo = 'David-Kunz/treesitter-unit'
depends = ['nvim-treesitter']
on_event = 'BufRead'

# =========================================================================
# Motion & Navigation
# =========================================================================
[[plugins]]
repo = 'smoka7/hop.nvim'
version = '*'
on_cmd = ['HopWord', 'HopLine', 'HopChar1', 'HopChar2']
hook_source = '''
lua << EOF
local ok, _ = pcall(require, 'plugins.hop')
if not ok then
  require('hop').setup()
end
EOF
'''

[[plugins]]
repo = 'unblevable/quick-scope'
on_event = 'BufRead'

[[plugins]]
repo = 'haya14busa/vim-edgemotion'
on_cmd = ['EdgeMotion']
on_event = 'BufRead'

# phaazon/hop.nvimはsmoka7/hop.nvimと重複するため削除
# [[plugins]]
# repo = 'phaazon/hop.nvim'
# branch = 'v2'
# on_cmd = ['HopWord', 'HopLine']

[[plugins]]
repo = 'mfussenegger/nvim-treehopper'
